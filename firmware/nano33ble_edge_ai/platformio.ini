; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:nano33ble]
platform = nordicnrf52
board = nano33ble
framework = arduino
lib_ldf_mode = deep+

; Monitor settings
monitor_speed = 115200
; monitor_port = COM3 ; Change to your port

; Build flags for nRF52840
build_flags = 
    -DARDUINO_NANO_33BLE
    -DNRF52840_XXAA
    -DARDUINO_ARCH_MBED
    -DEI_PORTING_ARDUINO=1
    -I.
    -Ilib
    -Ilib/edge-impulse-sdk
    -Ilib/edge-impulse-sdk/classifier
    -Ilib/model-parameters
    -Ilib/tflite-model

; Optional: Enable optimizations
build_unflags = 
    -Os

; Library dependencies
lib_deps =
    arduino-libraries/Arduino_OV767X
    adafruit/Adafruit GFX Library @ ^1.11.5
    adafruit/Adafruit SSD1306 @ ^2.5.7
    arduino-libraries/ArduinoBLE @ ^1.3.6
    adafruit/DHT sensor library @ ^1.4.4
    adafruit/Adafruit Unified Sensor @ ^1.1.9
    edge-impulse-sdk
    tflite-model
    model-parameters
