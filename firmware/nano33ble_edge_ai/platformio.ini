; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:nano33ble]
platform = nordicnrf52
board = nano33ble
framework = arduino

; Monitor settings
monitor_speed = 115200
; monitor_port = COM3 ; Change to your port

; Build flags for nRF52840
build_flags = 
    -DARDUINO_NANO_33BLE
    -DNRF52840_XXAA
    -DARDUINO_ARCH_MBED

; Optional: Enable optimizations
build_unflags = 
    -Os

; Library dependencies
lib_deps = 
    adafruit/Adafruit GFX Library @ ^1.11.5
    adafruit/Adafruit SSD1306 @ ^2.5.7

; ============================================================
; IMPORTANT: 
; 1. The OV7670 camera library is included in Arduino Mbed OS core
; 2. Add your Edge Impulse inference header file (Mango-Plant-Health-TinyML_inferencing.h) to src/ folder
; 3. Run 'pio run -e nano33ble' to build
; ============================================================
