sentence=Unified MangoGuard library combining mango health (camera) and forecasting (temp+humidity) Edge Impulse models.
paragraph=Provides the MangoGuard class with runHealthClassifier() for leaf disease detection (Anthracnose / Healthy / Powdery Mildew) and runForecastClassifier() for 24-hour climate risk forecasting (High_Anthracnose_Risk / High_Mildew_Risk / Stable). Single Edge Impulse SDK copy; no symbol conflicts between models.
